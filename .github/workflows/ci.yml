name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Run pytest
        run: python -m pytest tests/ -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run JS tests
        run: npm test

      - name: Build
        run: npm run build

      # The committed static/app bundle is what `python main.py serve` serves
      # at /app and what the backend contract tests inspect; the production
      # Docker image rebuilds its own. This gate keeps all three the same
      # artifact: a frontend/src change without a bundle recommit fails here
      # instead of shipping a stale /app to every non-Docker run (the
      # 2026-07-18 evaluation's headline finding — #67's chat_declined was
      # missing from the committed bundle and nothing could notice).
      - name: Committed bundle is fresh
        working-directory: .
        run: |
          if [ -n "$(git status --porcelain -- static/app)" ]; then
            git status --porcelain -- static/app
            echo "::error::static/app is stale — run 'cd frontend && npm run build' and commit the result."
            exit 1
          fi

  e2e:
    name: Browser E2E smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install the package (real server, real world)
        run: pip install -e .

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build the production bundle
        run: npm run build
        working-directory: frontend

      - name: Install Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      # Loads both clients from the real Python server under the production
      # CSP — the layer that would have caught the PixiJS blank-scene bug.
      - name: Run browser smoke tests
        run: npm run test:e2e
        working-directory: frontend
